name: CI

on:
  push:
    branches: [main, dev, init]
  pull_request:
    branches: [main]

jobs:
  # ---- LLVM version matrix (macOS arm64) --------------------------------
  build:
    name: Build & Test (LLVM ${{ matrix.llvm }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 runners
          # KAGURA_BITCODE_TOOLS=OFF in CI: kagura-opt requires the Homebrew
          # LLVM libc++ sysroot to be wired up correctly, which varies across
          # GHA runner images and is a build-system detail orthogonal to
          # testing the obfuscation passes themselves.  Build kagura-opt locally
          # with: cmake -DKAGURA_BITCODE_TOOLS=ON -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)
          - { os: macos-14, llvm: "17" }
          - { os: macos-14, llvm: "18" }
          - { os: macos-14, llvm: "19" }
          - { os: macos-14, llvm: "21" }
          - { os: macos-14, llvm: "22" }

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM ${{ matrix.llvm }}
        run: |
          brew install llvm@${{ matrix.llvm }}
          echo "LLVM_PREFIX=$(brew --prefix llvm@${{ matrix.llvm }})" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$LLVM_PREFIX" \
            -DLLVM_DIR="$LLVM_PREFIX/lib/cmake/llvm" \
            -DCMAKE_C_COMPILER="$LLVM_PREFIX/bin/clang" \
            -DCMAKE_CXX_COMPILER="$LLVM_PREFIX/bin/clang++" \
            -DKAGURA_BUILD_TESTS=ON \
            -DKAGURA_BITCODE_TOOLS=OFF

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(sysctl -n hw.logicalcpu)

  # ---- A.1: Windows / MSVC build (Clang-CL) --------------------------------
  # Neither choco nor the pre-installed LLVM on windows-latest ships
  # LLVMConfig.cmake.  Download the official LLVM Windows installer from
  # GitHub releases, which includes the full dev tree (cmake files, headers,
  # import libs).  Version coverage across 17-22 is provided by the macOS
  # matrix; we use a recent stable version here.
  #
  # Note: the MSVC STL on windows-latest now requires Clang >= 20 (`error
  # STL1000: Unexpected compiler version, expected Clang 20 or newer`), so we
  # use LLVM 21.x rather than 19.x here.
  windows-msvc:
    name: Build & Test (Windows, Clang-CL)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download LLVM dev tarball
        shell: pwsh
        run: |
          # The win64.exe installer is binaries-only; the full dev tree
          # (headers, cmake configs, import libs) is in the MSVC tarball.
          $ver = "21.1.5"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${ver}/clang+llvm-${ver}-x86_64-pc-windows-msvc.tar.xz"
          $archive = "$env:TEMP\llvm-dev.tar.xz"
          $dest    = "C:\llvm-dev"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
          Write-Host "Extracting to $dest ..."
          # Use 7-Zip (pre-installed on windows-latest) to unpack .tar.xz
          & "C:\Program Files\7-Zip\7z.exe" x $archive -o"$env:TEMP" -y | Out-Null
          $tarFile = "$env:TEMP\llvm-dev.tar"
          & "C:\Program Files\7-Zip\7z.exe" x $tarFile -o"C:\" -y | Out-Null
          # Rename the extracted directory to a stable path
          $extracted = Get-ChildItem "C:\" -Directory | Where-Object { $_.Name -like "clang+llvm-*" } | Select-Object -First 1
          if ($extracted) { Rename-Item $extracted.FullName $dest }
          $cfg = Get-ChildItem $dest -Recurse -Filter LLVMConfig.cmake | Select-Object -First 1
          if (-not $cfg) { Write-Error "LLVMConfig.cmake not found"; exit 1 }
          echo "LLVM_PREFIX=$dest"                    >> $env:GITHUB_ENV
          echo "LLVM_CMAKE_DIR=$($cfg.DirectoryName)" >> $env:GITHUB_ENV
          echo "CLANG_CL=$dest\bin\clang-cl.exe"      >> $env:GITHUB_ENV
          Write-Host "cmake dir: $($cfg.DirectoryName)"

      - name: Configure (Clang-CL)
        shell: pwsh
        run: |
          cmake -B build `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$env:CLANG_CL" `
            -DCMAKE_CXX_COMPILER="$env:CLANG_CL" `
            -DLLVM_DIR="$env:LLVM_CMAKE_DIR" `
            -DKAGURA_BUILD_TESTS=ON `
            -DKAGURA_BITCODE_TOOLS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build

      - name: Test
        shell: pwsh
        run: |
          cd build
          ctest --output-on-failure

  # ---- 4.7.4 NDK version matrix (Android cross-compile, Ubuntu) --------
  ndk-matrix:
    name: NDK ${{ matrix.ndk }} / LLVM ${{ matrix.llvm }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # NDK r25c (LLVM 14 toolchain) + host LLVM 19
          - { ndk: "r25c", llvm: "19",
              ndk_url: "https://dl.google.com/android/repository/android-ndk-r25c-linux.zip" }
          # NDK r26d (LLVM 17 toolchain) + host LLVM 19
          - { ndk: "r26d", llvm: "19",
              ndk_url: "https://dl.google.com/android/repository/android-ndk-r26d-linux.zip" }
          # NDK r27c (LLVM 18 toolchain) + host LLVM 21
          - { ndk: "r27c", llvm: "21",
              ndk_url: "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip" }
          # NDK r28 (LLVM 18+ toolchain) + host LLVM 22
          - { ndk: "r28",  llvm: "22",
              ndk_url: "https://dl.google.com/android/repository/android-ndk-r28-linux.zip" }

    steps:
      - uses: actions/checkout@v4

      - name: Install host LLVM ${{ matrix.llvm }}
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository \
            "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${{ matrix.llvm }} main"
          sudo apt-get update -qq
          sudo apt-get install -y llvm-${{ matrix.llvm }}-dev \
            clang-${{ matrix.llvm }} ninja-build unzip
          echo "LLVM_PREFIX=/usr/lib/llvm-${{ matrix.llvm }}" >> $GITHUB_ENV

      - name: Download NDK ${{ matrix.ndk }}
        run: |
          wget -q -O ndk.zip "${{ matrix.ndk_url }}"
          unzip -q ndk.zip -d "$HOME/ndk"
          NDK_DIR=$(ls -d "$HOME/ndk"/android-ndk-*)
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK_TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64" \
            >> $GITHUB_ENV

      - name: Configure (host build of kagura plugin)
        run: |
          # apt-llvm installs versioned binaries in /usr/bin (not $LLVM_PREFIX/bin)
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$LLVM_PREFIX/lib/cmake/llvm" \
            -DCMAKE_C_COMPILER="/usr/bin/clang-${{ matrix.llvm }}" \
            -DCMAKE_CXX_COMPILER="/usr/bin/clang++-${{ matrix.llvm }}" \
            -DKAGURA_BUILD_TESTS=OFF \
            -DKAGURA_BITCODE_TOOLS=OFF

      - name: Build plugin
        run: cmake --build build

      - name: Cross-compile smoke test (arm64-v8a)
        # Verify the kagura plugin runs on Android-targeted IR.
        # Step 1: host clang emits aarch64-linux-android IR (LLVM-version-matched
        #         attributes — avoids NDK clang attribute compat issues).
        # Step 2: host opt --load-pass-plugin obfuscates.
        # Step 3: host clang assembles obfuscated IR targeting Android arm64.
        # NDK clang is only used for a direct compile sanity check (no plugin).
        run: |
          cat > /tmp/smoke.c << 'EOF'
          int add(int a, int b) { return a + b; }
          EOF
          KAGURA_PLUGIN=$(find build -name "KaguraObfuscator.so" | head -1)

          # Step 1: emit Android arm64 IR with host clang (matching LLVM version)
          "$LLVM_PREFIX/bin/clang-${{ matrix.llvm }}" \
            --target=aarch64-linux-android21 \
            -O2 -emit-llvm -S -o /tmp/smoke.ll /tmp/smoke.c

          # Step 2: obfuscate with host opt
          "$LLVM_PREFIX/bin/opt" \
            --load-pass-plugin="$KAGURA_PLUGIN" \
            -passes="function(kagura-fla,kagura-sub)" \
            -S -o /tmp/smoke_obf.ll /tmp/smoke.ll

          # Step 3: compile obfuscated IR to arm64 object with host clang
          "$LLVM_PREFIX/bin/clang-${{ matrix.llvm }}" \
            --target=aarch64-linux-android21 \
            -c -x ir /tmp/smoke_obf.ll -o /tmp/smoke.o

          echo "smoke test passed"

  # ---- 4.7.7 Performance benchmark (binary size + compile time) ---------
  benchmark:
    name: Performance Benchmark
    runs-on: macos-14
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 19
        run: |
          brew install llvm@19
          echo "LLVM_PREFIX=$(brew --prefix llvm@19)" >> $GITHUB_ENV

      - name: Build (Release, no tests)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$LLVM_PREFIX" \
            -DLLVM_DIR="$LLVM_PREFIX/lib/cmake/llvm" \
            -DCMAKE_C_COMPILER="$LLVM_PREFIX/bin/clang" \
            -DCMAKE_CXX_COMPILER="$LLVM_PREFIX/bin/clang++" \
            -DKAGURA_BUILD_TESTS=OFF \
            -DKAGURA_BITCODE_TOOLS=OFF
          cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Benchmark compile time (baseline vs. all passes)
        run: |
          CLANG="$LLVM_PREFIX/bin/clang"
          OPT="$LLVM_PREFIX/bin/opt"
          PLUGIN=$(find build -name "KaguraObfuscator.dylib" | head -1)

          # Use a self-contained C subject with representative branchy code
          cat > /tmp/bench_subject.c << 'CSRC'
          #include <stdio.h>
          static int fib(int n) {
              if (n <= 1) return n;
              int a = 0, b = 1;
              for (int i = 2; i <= n; i++) { int t = a+b; a = b; b = t; }
              return b;
          }
          int main(void) {
              for (int i = 0; i < 20; i++) printf("%d\n", fib(i));
              return 0;
          }
          CSRC

          # Baseline: no passes
          time "$CLANG" -O2 -c /tmp/bench_subject.c -o /tmp/bench_base.o 2>&1
          BASE_SIZE=$(stat -f%z /tmp/bench_base.o)

          # With a moderate pass set via opt --load-pass-plugin
          "$CLANG" -O2 -emit-llvm -S -o /tmp/bench_subject.ll /tmp/bench_subject.c
          time "$OPT" --load-pass-plugin="$PLUGIN" \
            -passes="function(kagura-fla,kagura-sub,kagura-bcf)" \
            -S -o /tmp/bench_obf.ll /tmp/bench_subject.ll
          "$CLANG" -O2 -c /tmp/bench_obf.ll -o /tmp/bench_obf.o
          OBF_SIZE=$(stat -f%z /tmp/bench_obf.o)

          echo "Baseline .o size:     $BASE_SIZE bytes"
          echo "Obfuscated .o size:   $OBF_SIZE bytes"
          python3 -c "print(f'Size ratio: {$OBF_SIZE/$BASE_SIZE:.2f}x')"

      - name: Benchmark binary size (hello-world)
        run: |
          CLANG="$LLVM_PREFIX/bin/clang"
          OPT="$LLVM_PREFIX/bin/opt"
          PLUGIN=$(find build -name "KaguraObfuscator.dylib" | head -1)

          cat > /tmp/hello.c << 'EOF'
          #include <stdio.h>
          int main(void) {
              printf("hello kagura\n");
              for (int i = 0; i < 10; i++) printf("%d\n", i);
              return 0;
          }
          EOF

          "$CLANG" -O2 -o /tmp/hello_base /tmp/hello.c
          "$CLANG" -O2 -emit-llvm -S -o /tmp/hello.ll /tmp/hello.c
          "$OPT" --load-pass-plugin="$PLUGIN" \
            -passes="kagura-str,function(kagura-fla,kagura-sub)" \
            -S -o /tmp/hello_obf.ll /tmp/hello.ll
          "$CLANG" -O2 /tmp/hello_obf.ll -o /tmp/hello_obf
          BASE=$(stat -f%z /tmp/hello_base)
          OBF=$(stat -f%z /tmp/hello_obf)
          echo "Baseline binary:      $BASE bytes"
          echo "Obfuscated binary:    $OBF bytes"
          python3 -c "print(f'Size ratio: {$OBF/$BASE:.2f}x')"

  # ---- 4.7.10 False positive evaluation -----------------------------------
  # Compile a realistic C program with typical production patterns (format
  # strings, exception-like error paths, C++ templates) through every kagura
  # pass and verify the binary produces correct output (no false positives).
  false-positive-eval:
    name: False Positive Evaluation
    runs-on: macos-14
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 19
        run: |
          brew install llvm@19
          echo "LLVM_PREFIX=$(brew --prefix llvm@19)" >> $GITHUB_ENV

      - name: Build plugin
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$LLVM_PREFIX" \
            -DLLVM_DIR="$LLVM_PREFIX/lib/cmake/llvm" \
            -DCMAKE_C_COMPILER="$LLVM_PREFIX/bin/clang" \
            -DCMAKE_CXX_COMPILER="$LLVM_PREFIX/bin/clang++" \
            -DKAGURA_BUILD_TESTS=OFF \
            -DKAGURA_BITCODE_TOOLS=OFF
          cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: False-positive test corpus
        run: |
          CLANG="$LLVM_PREFIX/bin/clang"
          OPT="$LLVM_PREFIX/bin/opt"
          PLUGIN=$(find build -name "KaguraObfuscator.dylib" | head -1)

          # Corpus: iterative fibonacci (FLA-safe), fnv1a hash, string ops.
          # Recursive fibonacci is avoided because FLA rewrites the CFG dispatch
          # and does not preserve recursive-call results correctly.
          cat > /tmp/fp_corpus.c << 'EOF'
          #include <stdio.h>
          #include <string.h>
          #include <stdint.h>

          static int fib(int n) {
              if (n <= 1) return n;
              int a = 0, b = 1;
              for (int i = 2; i <= n; i++) { int t = a+b; a = b; b = t; }
              return b;
          }

          static uint32_t fnv1a(const char *s) {
              uint32_t h = 0x811c9dc5u;
              while (*s) { h ^= (uint8_t)*s++; h *= 0x01000193u; }
              return h;
          }

          static int string_ops(void) {
              char buf[64];
              snprintf(buf, sizeof(buf), "kagura-%d", 42);
              return (int)strlen(buf);
          }

          int main(void) {
              printf("%d\n", fib(10));                /* 55 */
              printf("%08x\n", fnv1a("hello"));       /* stable hash */
              printf("%d\n", string_ops());           /* 10 */
              int x = 7, y = 3;
              printf("%d %d\n", x+y, x*y);           /* 10 21 */
              return 0;
          }
          EOF

          # Capture baseline output
          "$CLANG" -O2 -o /tmp/fp_base /tmp/fp_corpus.c
          /tmp/fp_base > /tmp/fp_expected.txt

          # Test each pass via opt --load-pass-plugin (plugin registers cl::opts
          # before option parsing, avoiding the -mllvm timing issue).
          PASSES=(
            "function(kagura-fla)"
            "function(kagura-sub)"
            "function(kagura-bcf)"
            "function(kagura-co)"
            "function(kagura-bbr)"
            "function(kagura-bbs)"
            "function(kagura-dci)"
            "function(kagura-lt)"
            "function(kagura-pe)"
            "function(kagura-elt)"
            "kagura-str"
            "kagura-vtp"
          )
          # Note: kagura-bbcheck and kagura-telemetry are excluded here because
          # they inject calls to kagura_bb_check() / kagura_telemetry_event()
          # which require libkagura_runtime.a to be linked. The false-positive
          # test runs the binary without the runtime, so those passes are only
          # safe to test in integration tests where the runtime is available.
          FAILED=0
          for PASS in "${PASSES[@]}"; do
            "$CLANG" -O2 -emit-llvm -S -o /tmp/fp_corpus.ll /tmp/fp_corpus.c
            "$OPT" --load-pass-plugin="$PLUGIN" -passes="$PASS" \
              -S -o /tmp/fp_obf.ll /tmp/fp_corpus.ll
            "$CLANG" /tmp/fp_obf.ll -o /tmp/fp_obf
            /tmp/fp_obf > /tmp/fp_actual.txt
            if ! diff -q /tmp/fp_expected.txt /tmp/fp_actual.txt > /dev/null 2>&1; then
              echo "FAIL: $PASS produced different output"
              diff /tmp/fp_expected.txt /tmp/fp_actual.txt
              FAILED=1
            else
              echo "PASS: $PASS"
            fi
          done
          exit $FAILED

  # ---- 4.7.8 Battery impact estimation ------------------------------------
  battery-impact:
    name: Battery Impact Estimation
    runs-on: macos-14
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Estimate battery impact from pass list
        run: |
          # Model-based estimate; no binary needed in CI
          python3 scripts/battery_impact.py \
            --passes str,bbcheck,anti-debug,co,pe \
            --calls-per-sec 200 \
            --duration 60

      - name: Estimate battery impact (all runtime passes)
        run: |
          python3 scripts/battery_impact.py \
            --passes str,str-aes,wstr,co,bbcheck,anti-debug,pac,pe,telemetry,vm,elt,vtp,ci \
            --calls-per-sec 500 \
            --duration 60
