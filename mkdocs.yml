site_name: kagura
site_description: LLVM-based code obfuscation and anti-tamper toolkit
site_url: https://ykus4.github.io/kagura
repo_url: https://github.com/ykus4/kagura
repo_name: ykus4/kagura
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Getting Started: はじめに
            Quick Start: クイックスタート
            Build from Source: ソースからビルド
            Requirements: 動作要件
            Passes: パス
            Control Flow: 制御フロー
            Data Obfuscation: データ難読化
            Anti-Analysis: アンチ解析
            Platform-Specific: プラットフォーム固有
            Infrastructure: インフラ
            Before / After Examples: Before/After 例
            Performance & Size Impact: パフォーマンス・サイズ影響
            Integration: 統合
            Xcode: Xcode
            Android NDK: Android NDK
            Unity (IL2CPP): Unity (IL2CPP)
            Unreal Engine 5: Unreal Engine 5
            CMake Toolchain: CMake ツールチェイン
            Bazel: Bazel
            CocoaPods: CocoaPods
            Swift Package Manager: Swift Package Manager
            Cookbook: クックブック
            Banking / FinTech: 銀行・FinTech
            Mobile game / anti-cheat: モバイルゲーム・アンチチート
            SDK / library vendor: SDK/ライブラリベンダー
            DRM / license enforcement: DRM/ライセンス
            Security Model: セキュリティモデル
            Configuration: 設定
            Overview: 概要
            Tuning Parameters: チューニングパラメータ
            Pass Order: パス順序
            Runtime: ランタイム
            Runtime Library: ランタイムライブラリ
            Game Protection: ゲーム保護
            Project: プロジェクト
            Testing & Evaluation: テスト・評価
            Architecture: アーキテクチャ
            Contributing: コントリビュート

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Quick Start: getting-started/quick-start.md
      - Build from Source: getting-started/build-from-source.md
      - Requirements: getting-started/requirements.md
  - Passes:
      - passes/index.md
      - Control Flow: passes/control-flow.md
      - Data Obfuscation: passes/data.md
      - Anti-Analysis: passes/anti-analysis.md
      - Platform-Specific: passes/platform.md
      - Infrastructure: passes/infrastructure.md
      - Before / After Examples: passes/before-after.md
      - Performance & Size Impact: passes/performance.md
  - Integration:
      - integration/index.md
      - Xcode: integration/xcode.md
      - Android NDK: integration/android.md
      - Unity (IL2CPP): integration/unity.md
      - Unreal Engine 5: integration/unreal.md
      - CMake Toolchain: integration/cmake.md
      - Bazel: integration/bazel.md
      - CocoaPods: integration/cocoapods.md
      - Swift Package Manager: integration/swiftpm.md
  - Configuration:
      - Overview: configuration.md
      - Tuning Parameters: tuning.md
      - Pass Order: pass-order.md
  - Runtime:
      - Runtime Library: runtime.md
      - Game Protection: game-protection.md
  - Project:
      - Testing & Evaluation: testing.md
      - Architecture: architecture.md
      - Contributing: contributing.md
